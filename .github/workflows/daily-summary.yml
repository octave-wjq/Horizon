name: Daily Horizon Summary

on:
  schedule:
    # GitHub cron is UTC. Times below are Asia/Shanghai (UTC+8):
    #   07:30  primary
    #   08:30  retry if primary missed/failed
    #   09:30  final retry
    # :30 past the hour reduces top-of-hour Actions congestion skips.
    - cron: '30 23 * * *'   # 07:30 Asia/Shanghai
    - cron: '30 0 * * *'    # 08:30 Asia/Shanghai
    - cron: '30 1 * * *'    # 09:30 Asia/Shanghai
  workflow_dispatch:        # Always runs (ignores "already done today" skip)

jobs:
  daily-summary:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed to commit changes / deploy Pages

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Decide whether to run today
        id: gate
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Use Shanghai calendar date so morning retries share the same "day".
          TODAY=$(TZ=Asia/Shanghai date +'%Y-%m-%d')
          echo "DATE=$TODAY" >> "$GITHUB_ENV"
          echo "today=$TODAY" >> "$GITHUB_OUTPUT"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual dispatch → always run"
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Scheduled retries: skip if today's digest already landed on gh-pages.
          POST_PATH="_posts/${TODAY}-summary-zh.md"
          API="https://api.github.com/repos/${{ github.repository }}/contents/${POST_PATH}?ref=gh-pages"
          code=$(curl -sS -o /tmp/post_meta.json -w "%{http_code}" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "$API" || true)

          if [ "$code" = "200" ]; then
            echo "Found existing $POST_PATH on gh-pages (HTTP $code) → skip retry"
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "No successful digest for $TODAY yet (HTTP $code) → run"
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.gate.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        if: steps.gate.outputs.should_run == 'true'
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        if: steps.gate.outputs.should_run == 'true'
        run: uv sync

      - name: Prepare GitHub Actions config
        if: steps.gate.outputs.should_run == 'true'
        run: cp data/config.github.json data/config.json

      - name: Verify required secrets
        if: steps.gate.outputs.should_run == 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          HORIZON_WEBHOOK_URL: ${{ secrets.HORIZON_WEBHOOK_URL }}
        run: |
          missing=0
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "::error::OPENAI_API_KEY secret is empty. Set it in repo Settings → Secrets and variables → Actions."
            missing=1
          else
            echo "OPENAI_API_KEY is set (length=${#OPENAI_API_KEY})"
          fi
          if [ -z "$HORIZON_WEBHOOK_URL" ]; then
            echo "::error::HORIZON_WEBHOOK_URL secret is empty. Feishu push will be skipped/fail."
            missing=1
          else
            echo "HORIZON_WEBHOOK_URL is set (length=${#HORIZON_WEBHOOK_URL})"
          fi
          exit "$missing"

      - name: Run Horizon
        if: steps.gate.outputs.should_run == 'true'
        env:
          # Required: OPENAI_API_KEY (Packy/OpenAI-compatible), HORIZON_WEBHOOK_URL (Feishu)
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          LWN_KEY: ${{ secrets.LWN_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          HORIZON_WEBHOOK_URL: ${{ secrets.HORIZON_WEBHOOK_URL }}
          # Prefer optional PAT for higher GitHub API quota; fall back to workflow token
          GITHUB_TOKEN: ${{ secrets.GH_PAT || github.token }}
        run: uv run horizon --hours 24

      - name: Deploy to GitHub Pages
        if: steps.gate.outputs.should_run == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          keep_files: true  # Keep existing summaries on gh-pages branch
          commit_message: "📝 Daily Summary: ${{ env.DATE }}"
          publish_branch: gh-pages
          enable_jekyll: true

      - name: Skipped because already delivered today
        if: steps.gate.outputs.should_run != 'true'
        run: |
          echo "Skip: digest for ${{ steps.gate.outputs.today }} already exists on gh-pages."
          echo "No Feishu re-send. Use workflow_dispatch to force a fresh run."
