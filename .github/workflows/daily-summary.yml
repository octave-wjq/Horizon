name: Daily Horizon Summary

on:
  schedule:
    # GitHub cron is UTC only.
    # 23:30 UTC ≈ 07:30 Asia/Shanghai (next calendar morning).
    # Use :30 past the hour — top-of-hour schedules are often delayed/skipped under load.
    - cron: '30 23 * * *'
    # Backup slot same day evening UTC in case the morning slot is skipped.
    - cron: '30 11 * * *'
  workflow_dispatch:      # Manual trigger: Actions → Daily Horizon Summary → Run workflow

jobs:
  daily-summary:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed to commit changes / deploy Pages

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync

      - name: Prepare GitHub Actions config
        run: cp data/config.github.json data/config.json

      - name: Verify required secrets
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          HORIZON_WEBHOOK_URL: ${{ secrets.HORIZON_WEBHOOK_URL }}
        run: |
          missing=0
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "::error::OPENAI_API_KEY secret is empty. Set it in repo Settings → Secrets and variables → Actions."
            missing=1
          else
            echo "OPENAI_API_KEY is set (length=${#OPENAI_API_KEY})"
          fi
          if [ -z "$HORIZON_WEBHOOK_URL" ]; then
            echo "::error::HORIZON_WEBHOOK_URL secret is empty. Feishu push will be skipped/fail."
            missing=1
          else
            echo "HORIZON_WEBHOOK_URL is set (length=${#HORIZON_WEBHOOK_URL})"
          fi
          exit "$missing"

      - name: Run Horizon
        env:
          # Required: OPENAI_API_KEY (Packy/OpenAI-compatible), HORIZON_WEBHOOK_URL (Feishu)
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          LWN_KEY: ${{ secrets.LWN_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          HORIZON_WEBHOOK_URL: ${{ secrets.HORIZON_WEBHOOK_URL }}
          # Prefer optional PAT for higher GitHub API quota; fall back to workflow token
          GITHUB_TOKEN: ${{ secrets.GH_PAT || github.token }}
        run: uv run horizon --hours 24

      - name: Set current date as environment variable
        run: echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          keep_files: true  # Keep existing summaries on gh-pages branch
          commit_message: "📝 Daily Summary: ${{ env.DATE }}"
          publish_branch: gh-pages
          enable_jekyll: true
